- sensor:
    - unique_id: napelsstraat_available_chargers
      name: "Napelsstraat Available Chargers"
      state: >
        {% set sensors = [
          'sensor.blink_charging_23_napelsstraat_antwerpen_3',
          'sensor.blink_charging_23_napelsstraat_antwerpen_4'
        ] %}
        {% set available = namespace(count=0) %}
        {% for sensor in sensors %}
          {% if states(sensor) | lower == 'available' %}
            {% set available.count = available.count + 1 %}
          {% endif %}
        {% endfor %}
        {{ available.count }}
      icon: >
        {% if states(this.entity_id) | int(0) > 0 %}
          hass:ev-station-outline#00c853
        {% else %}
          hass:ev-station-outline#ff0000
        {% endif %}
      attributes:
        total_spots: >
          {% set sensors = [
            'sensor.blink_charging_23_napelsstraat_antwerpen_3',
            'sensor.blink_charging_23_napelsstraat_antwerpen_4'
          ] %}
          {{ sensors | length }}
        friendly_text: >
          {% set sensors = [
            'sensor.blink_charging_23_napelsstraat_antwerpen_3',
            'sensor.blink_charging_23_napelsstraat_antwerpen_4'
          ] %}
          {% set available = namespace(count=0) %}
          {% for sensor in sensors %}
            {% if states(sensor) | lower == 'available' %}
              {% set available.count = available.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ available.count }}/{{ sensors | length }} Available

