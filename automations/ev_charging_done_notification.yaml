alias: Car – Charging Complete Notification
description: >-
  Announce when the car has finished charging, only if I'm home.
triggers:
  - platform: state
    entity_id: binary_sensor.2cjn170_caitlyn_charging_active
    from: 'on'
    to: 'off'
conditions:
  - condition: zone
    entity_id: device_tracker.pixel_8_3
    zone: zone.home
  - condition: template
    value_template: >
      {% set charging_power = states('sensor.2cjn170_caitlyn_charging_power') | float(0) %}
      {{ charging_power <= 0.1 }}
actions:
  - target:
      entity_id: tts.piper
    data:
      media_player_entity_id: media_player.all_but_bed_speakers
      message: oyá kopeng, your vehicle has finished charging.
    action: tts.speak
mode: single