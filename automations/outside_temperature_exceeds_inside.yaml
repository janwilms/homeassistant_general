alias: Outside Temperature Exceeds Inside Temperature
description: Alert when outside temperature is higher than any inside sensor
triggers:
  - trigger: template
    id: crossed_outside_over_inside
    value_template: >
      {{ states('sensor.outside_sensor_temperature_3') | float(0) >
         states('sensor.inside_average_temperature') | float(0) }}
conditions:
  - condition: template
    value_template: >
      {% set last_triggered = state_attr(this.entity_id, 'last_triggered') %} {%
      if last_triggered is none %}
        true
      {% else %}
        {% set time_diff = (now() - last_triggered).total_seconds() / 3600 %}
        {{ time_diff >= 1 }}
      {% endif %}
    enabled: true
  - condition: zone
    entity_id: device_tracker.pixel_8_3
    zone: zone.home
  - condition: time
    after: "08:00:00"
    before: "22:00:00"
actions:
  - variables:
      outside_temp: "{{ states('sensor.outside_sensor_temperature_3') | float | round(1) }}"
      inside_avg_temp: "{{ states('sensor.inside_average_temperature') | float | round(1) }}"
  - action: notify.mobile_app_d_anvers_edge_beacon_8
    metadata: {}
    data:
      title: 🌡️ Outside temperature alert!
      message: >
        Outside: {{ outside_temp }}°C exceeds inside average: {{ inside_avg_temp
        }}°C
      data:
        car_ui: true
        ttl: 0
        priority: high
        importance: high
  - target:
      entity_id:
        - tts.piper
    data:
      media_player_entity_id: media_player.all_but_bed_speakers
      message: >
        Sir, outside temperature is {{ outside_temp }} degrees, it is now
        exceeding the inside average of {{ inside_avg_temp }} degrees. Please
        take measures to keep out the heat.
    action: tts.speak
mode: single
