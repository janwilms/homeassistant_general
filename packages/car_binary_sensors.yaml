# ==============================================================================
# CAR PACKAGE — BINARY SENSORS (FACADE)
# Pure facade — reads from car_*_source entities in car_mapping.yaml
# DO NOT EDIT THIS FILE
# If you need to change a data source, edit car_mapping.yaml instead
# ==============================================================================

template:
  - binary_sensor:

      - name: "Car Charging"
        unique_id: car_charging
        device_class: battery_charging
        state: "{{ is_state('binary_sensor.car_charging_source', 'on') }}"

