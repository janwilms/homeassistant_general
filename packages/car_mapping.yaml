# ==============================================================================
# CAR PACKAGE — MAPPING
# ==============================================================================
# THIS IS THE ONLY FILE YOU TOUCH IN JULY
#
# Each sensor here maps a generic car_*_source entity to its data source.
# Now:  points to mock helpers (input_number / input_boolean)
# July: replace the entity ID on the right with the real Kia entity ID
#
# Example swap:
#   now:  state: "{{ states('input_number.mock_car_ev_battery') }}"
#   july: state: "{{ states('sensor.camina_ev_battery_level') }}"
#
# Find real Kia entity IDs in:
#   HA Settings → Devices → your Kia device → entities list
# ==============================================================================

template:
  # ----------------------------------------------------------------------------
  # NUMERIC SOURCES
  # ----------------------------------------------------------------------------

  - sensor:
      - name: "Car EV Battery Source"
        unique_id: car_ev_battery_source
        unit_of_measurement: "%"
        state: "{{ states('input_number.mock_car_ev_battery') }}"
        # july: "{{ states('sensor.camina_ev_battery_level') }}"

      - name: "Car 12V Battery Source"
        unique_id: car_12v_battery_source
        unit_of_measurement: "%"
        state: "{{ states('input_number.mock_car_12v_battery') }}"
        # july: "{{ states('sensor.camina_car_battery_level') }}"

      - name: "Car EV Range Source"
        unique_id: car_ev_range_source
        unit_of_measurement: km
        state: "{{ states('input_number.mock_car_ev_range') }}"
        # july: "{{ states('sensor.camina_ev_range') }}"

      - name: "Car Total Range Source"
        unique_id: car_total_range_source
        unit_of_measurement: km
        state: "{{ states('input_number.mock_car_total_range') }}"
        # july: "{{ states('sensor.camina_total_driving_range') }}"

      - name: "Car Odometer Source"
        unique_id: car_odometer_source
        unit_of_measurement: km
        state: "{{ states('input_number.mock_car_odometer') }}"
        # july: "{{ states('sensor.camina_odometer') }}"

      - name: "Car Charge ETA Source"
        unique_id: car_charge_eta_source
        unit_of_measurement: min
        state: "{{ states('input_number.mock_car_charge_eta') }}"
        # july: "{{ states('sensor.camina_estimated_charge_duration') }}"

      - name: "Car Charging Power Source"
        unique_id: car_charging_power_source
        unit_of_measurement: kW
        state: "{{ states('input_number.mock_car_charging_power') }}"
        # july: "{{ states('sensor.camina_ev_charging_power') }}"

      - name: "Car Climate Target Temp Source"
        unique_id: car_climate_target_temp_source
        unit_of_measurement: "°C"
        state: "{{ states('input_number.mock_car_climate_target_temp') }}"
        # july: "{{ states('sensor.camina_set_temperature') }}"

      - name: "Car Location Name Source"
        unique_id: car_location_name_source
        state: "Home (mock)"
        # july: "{{ states('sensor.camina_geocoded_location') }}"

      - name: "Car Last Updated Source"
        unique_id: car_last_updated_source
        state: "{{ now().isoformat() }}"
        # july: "{{ states('sensor.camina_last_updated_at') }}"

      - name: "Car Fast Charge ETA Source"
        unique_id: car_fast_charge_eta_source
        unit_of_measurement: min
        state: "{{ states('input_number.mock_car_fast_charge_eta') }}"
        # july: "{{ states('sensor.camina_estimated_fast_charge_duration') }}"

      - name: "Car Battery SOH Source"
        unique_id: car_battery_soh_source
        unit_of_measurement: "%"
        state: "{{ states('input_number.mock_car_battery_soh') }}"
        # july: "{{ states('sensor.camina_ev_state_of_health') }}"

  # ----------------------------------------------------------------------------
  # BOOLEAN SOURCES
  # ----------------------------------------------------------------------------

  - binary_sensor:
      - name: "Car Charging Source"
        unique_id: car_charging_source
        state: "{{ is_state('input_boolean.mock_car_charging', 'on') }}"
        # july: "{{ is_state('binary_sensor.camina_ev_battery_charge', 'on') }}"

      - name: "Car Plugged In Source"
        unique_id: car_plugged_in_source
        state: "{{ is_state('input_boolean.mock_car_plugged_in', 'on') }}"
        # july: "{{ is_state('binary_sensor.camina_ev_battery_plugged_in', 'on') }}"

      - name: "Car Locked Source"
        unique_id: car_locked_source
        state: "{{ is_state('input_boolean.mock_car_locked', 'on') }}"
        # july: "{{ is_state('lock.camina_door_lock', 'locked') }}"

      - name: "Car Door FL Source"
        unique_id: car_door_fl_source
