            {{ avail }}/{{ ns.t }} Available

      - name: "Madrasstraat Chargers"
        unique_id: madrasstraat_chargers_tomtom
        state: "{{ states('sensor.madrasstraat_chargers_raw') }}"
        icon: >-
          {% if states('sensor.madrasstraat_chargers_raw') | int(0) > 0 %}
