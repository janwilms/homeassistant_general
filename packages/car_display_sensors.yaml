# ==============================================================================
# CAR DISPLAY SENSORS
# ==============================================================================
# All sensors here are formatted strings, booleans or aggregates
# intended purely for display — not used elsewhere in automations or logic.
# ==============================================================================

template:
  - sensor:
      - name: "Car Display Name"
        unique_id: car_display_name
        icon: mdi:car
        state: "2-CJN-170 Caitlyn"
        # camina: change to "Camina" or any display name you want

      - name: "Car Display Secured"
        unique_id: car_display_secured
        icon: mdi:shield-lock
        state: >
          {{ is_state('lock.2cjn170_caitlyn_lock', 'locked')
             and is_state('binary_sensor.2cjn170_caitlyn_windows_closed', 'on') }}
        # camina: expand with doors/trunk/hood/sunroof:
        # {{ is_state('lock.camina_lock', 'locked')
        #    and is_state('binary_sensor.camina_trunk_is_open', 'off')
        #    and is_state('binary_sensor.camina_hood_is_open', 'off')
        #    and is_state('binary_sensor.camina_sunroof_is_open', 'off')
        #    and is_state('binary_sensor.camina_front_left_window_is_open', 'off')
        #    and is_state('binary_sensor.camina_front_right_window_is_open', 'off')
        #    and is_state('binary_sensor.camina_back_left_window_is_open', 'off')
        #    and is_state('binary_sensor.camina_back_right_window_is_open', 'off') }}

      - name: "Car Secured Text"
        unique_id: car_display_secured_text
        icon: mdi:shield-lock
        state: >
          {{ 'Secured' if is_state('sensor.car_display_secured', 'True') else 'Not Secured' }}

      - name: "Car End of Charge"
        unique_id: car_display_end_of_charge
        icon: mdi:clock-end
        state: >
          {% set src = states('sensor.2cjn170_caitlyn_end_of_charge') %}
          {% if src in ['unknown', 'unavailable', 'none', '', 'None'] %}
            --:--
          {% else %}
            {% set end_dt = as_local(as_datetime(src)) %}
            {% if end_dt.date() > now().date() %}
              {{ end_dt.strftime('%H:%M') }} ({{ end_dt.strftime('%d/%m') }})
            {% else %}
              {{ end_dt.strftime('%H:%M') }}
            {% endif %}
          {% endif %}
        # camina: Kia gives minutes remaining, not a timestamp. Calculate end time:
        # {% set ac_mins = states('sensor.camina_ev_estimated_current_charge_duration') | float(-1) %}
        # {% set dc_mins = states('sensor.camina_ev_estimated_fast_charge_duration') | float(-1) %}
        # {% set mins = ac_mins if ac_mins >= 0 else dc_mins %}
        # {% set src = 'unknown' if mins < 0 else (now() + timedelta(minutes=mins)).isoformat() %}
        # Then same formatting logic as above.

      - name: "Car Display Charging Zone"
        unique_id: car_display_charging_zone
        icon: mdi:map-marker
        state: >-
          {% if is_state('binary_sensor.2cjn170_caitlyn_charging_active', 'on') %}
            {% set loc = states('device_tracker.2cjn170_caitlyn_device_tracker') %}
            {% set short = {
              'home': 'Home',
              'not_home': 'Other',
              'Larger Home Zone': 'Home',
              'Greenyard Office': 'Greenyard',
              'Greenyard Parking Lot': 'Greenyard'
            } %}
            {{ short.get(loc, loc | replace(' Chargers', '')) }}
          {%- else -%}
            none
          {%- endif %}
        # camina: swap to binary_sensor.camina_ev_battery_charge + camina device_tracker

