# ==============================================================================
# CAR PACKAGE — INPUTS
# Mock helpers only — these simulate car data while no real car is connected
# Do not reference these directly in dashboards or automations
# Use the facade sensors in car_sensors.yaml and car_binary_sensors.yaml
# ==============================================================================

# ------------------------------------------------------------------------------
# NUMERIC MOCK DATA
# ------------------------------------------------------------------------------

input_number:
  mock_car_ev_battery:
    name: Mock EV Battery
    min: 0
    max: 100
    step: 1
    initial: 80
    unit_of_measurement: "%"
    icon: mdi:battery-80

  mock_car_12v_battery:
    name: Mock 12V Battery
    min: 0
    max: 100
    step: 1
    initial: 95
    unit_of_measurement: "%"
    icon: mdi:car-battery

  mock_car_ev_range:
    name: Mock EV Range
    min: 0
    max: 600
    step: 1
    initial: 320
    unit_of_measurement: km
    icon: mdi:road-variant

  mock_car_total_range:
    name: Mock Total Range
    min: 0
    max: 600
    step: 1
    initial: 320
    unit_of_measurement: km
    icon: mdi:road-variant

  mock_car_odometer:
    name: Mock Odometer
    min: 0
    max: 999999
    step: 1
    initial: 1000
    unit_of_measurement: km
    icon: mdi:speedometer

  mock_car_charge_eta:
    name: Mock Charge ETA
    min: 0
    max: 600
    step: 1
    initial: 45
    unit_of_measurement: min
    icon: mdi:ev-station

  mock_car_charging_power:
    name: Mock Charging Power
    min: 0
    max: 150
    step: 0.1
    initial: 11.0
    unit_of_measurement: kW
    icon: mdi:flash

  mock_car_climate_target_temp:
    name: Mock Climate Target Temp
    min: 14
    max: 30
    step: 0.5
    initial: 21
    unit_of_measurement: "°C"
    icon: mdi:thermometer

  mock_car_fast_charge_eta:
    name: Mock Fast Charge ETA
    min: 0
    max: 120
    step: 1
    initial: 0
    unit_of_measurement: min
    icon: mdi:lightning-bolt

  mock_car_battery_soh:
    name: Mock Battery State of Health
    min: 0
    max: 100
    step: 1
    initial: 100
    unit_of_measurement: "%"
    icon: mdi:battery-heart

