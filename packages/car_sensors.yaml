# ==============================================================================
# CAR PACKAGE — SENSORS (FACADE)
# Pure facade — reads from car_*_source entities in car_mapping.yaml
# DO NOT EDIT THIS FILE
# If you need to change a data source, edit car_mapping.yaml instead
# ==============================================================================

template:
  - sensor:

      - name: "Car EV Battery"
        unique_id: car_ev_battery
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        icon: mdi:battery-charging-80
        state: "{{ states('sensor.car_ev_battery_source') }}"

      - name: "Car 12V Battery"
        unique_id: car_12v_battery
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:car-battery
        state: "{{ states('sensor.car_12v_battery_source') }}"

      - name: "Car EV Range"
        unique_id: car_ev_range
        unit_of_measurement: km
        device_class: distance
        state_class: measurement
        icon: mdi:road-variant
        state: "{{ states('sensor.car_ev_range_source') }}"

      - name: "Car Total Range"
        unique_id: car_total_range
        unit_of_measurement: km
        device_class: distance
        state_class: measurement
        icon: mdi:road-variant
        state: "{{ states('sensor.car_total_range_source') }}"

      - name: "Car Odometer"
        unique_id: car_odometer
        unit_of_measurement: km
        device_class: distance
        state_class: total_increasing
        icon: mdi:speedometer
        state: "{{ states('sensor.car_odometer_source') }}"

      - name: "Car Charge ETA"
        unique_id: car_charge_eta
        unit_of_measurement: min
        icon: mdi:ev-station
        state: "{{ states('sensor.car_charge_eta_source') }}"

      - name: "Car Charging Power"
        unique_id: car_charging_power
        unit_of_measurement: kW
        device_class: power
        state_class: measurement
        icon: mdi:flash
        state: "{{ states('sensor.car_charging_power_source') }}"

      - name: "Car Climate Target Temp"
        unique_id: car_climate_target_temp
        unit_of_measurement: "°C"
        device_class: temperature
        icon: mdi:thermometer
        state: "{{ states('sensor.car_climate_target_temp_source') }}"

      - name: "Car Location Name"
        unique_id: car_location_name
        icon: mdi:map-marker
        state: "{{ states('sensor.car_location_name_source') }}"

      - name: "Car Last Updated"
        unique_id: car_last_updated
        device_class: timestamp
        icon: mdi:update
        state: "{{ states('sensor.car_last_updated_source') }}"

      - name: "Car Fast Charge ETA"
        unique_id: car_fast_charge_eta
        unit_of_measurement: min
        icon: mdi:lightning-bolt
        state: "{{ states('sensor.car_fast_charge_eta_source') }}"

      - name: "Car Battery SOH"
        unique_id: car_battery_soh
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:battery-heart
        state: "{{ states('sensor.car_battery_soh_source') }}"