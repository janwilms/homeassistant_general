views:
  - type: sections
    max_columns: 4
    title: Overview
    path: overview
    sections:
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Weather and Forecast
          - type: custom:weather-card
            entity: weather.forecast_home
            grid_options:
              columns: 12
              rows: auto
          - show_current: false
            show_forecast: true
            type: weather-forecast
            entity: weather.forecast_home
            forecast_type: hourly
            grid_options:
              columns: 24
              rows: 2
            forecast_slots: 12
          - type: heading
            icon: ''
            heading: Home
            heading_style: title
          - type: custom:mini-graph-card
            name: Outside Temperature
            entities:
              - type: sensor
                entity: sensor.outside_sensor_temperature_3
                name: Outside
            hours_to_show: 72
            points_per_hour: 4
            height: 60
            color_thresholds:
              - value: 16
                color: '#0000cc'
              - value: 18
                color: '#330066'
              - value: 20
                color: '#ff6600'
              - value: 22
                color: '#cc3333'
              - value: 24
                color: '#990000'
              - value: 26
                color: '#660000'
            animate: true
